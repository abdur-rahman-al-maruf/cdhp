<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Appointments</title>
    <link rel="icon" href="../img/CDHP_Logo.ico">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            light: '#e2e8f0',
                            primary: '#0ea5e9',
                            secondary: '#14b8a6',
                            accent: '#6366f1',
                            emerald: '#10b981'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;900&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* General Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        /* Modal-like Tooltip implementation for truncated text */
        .complaint-box[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 105%;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            white-space: normal;
            width: max-content;
            max-width: 320px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.8), 0 8px 10px -6px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 50;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        
        /* Triangle pointer for tooltip */
        .complaint-box[title]:hover::before {
            content: '';
            position: absolute;
            bottom: 105%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #0f172a transparent transparent transparent;
            margin-bottom: 0px;
            z-index: 51;
        }

        /* Loader & Toast Styles */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; font-size: 3rem; color: #14b8a6; }
        #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: #f8fafc; padding: 0.875rem 1.5rem; border-radius: 9999px; font-size: 0.875rem; transition: transform 0.4s ease, opacity 0.4s ease; opacity: 0; z-index: 9999; white-space: nowrap; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #toast.success { border-bottom: 2px solid #14b8a6; }
        #toast.error { border-bottom: 2px solid #ef4444; }
    </style>
</head>

<body class="antialiased selection:bg-brand-secondary selection:text-white pt-[70px]">

    <div id="header-placeholder" data-header="header.html"></div>
    <div id="global-loader" class="loader-overlay"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
    <div id="toast"></div>

    <!-- Main Wrapper -->
    <div class="flex h-[calc(100vh-70px)] w-full overflow-hidden relative">

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto px-4 py-2 lg:px-8 lg:py-2 relative z-10 w-full">
            
            <!-- Background Glow Effects for Appointment Vibe -->
            <div class="absolute top-0 left-0 w-96 h-96 bg-brand-primary/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
            <div class="absolute bottom-0 right-0 w-96 h-96 bg-brand-secondary/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

            <!-- ১. হেডার ও ফিল্টার স্ট্যাটাস -->
            <div class="mb-2 relative z-10">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
                        <i class="fa-regular fa-calendar-check text-brand-primary"></i> Upcoming Appointments
                    </h1>
                    <p class="text-sm text-gray-400 max-w-2xl truncate">
                        Manage your confirmed appointments and start consultations seamlessly.
                    </p>
                </div>
            </div>

            <!-- ২. মূল তালিকা: পেশেন্ট কার্ড (Compact Horizontal List) -->
            <div id="appointments-container" class="space-y-4 relative z-10 pb-12 mt-4">
                <!-- Javascript will inject upcoming appointment cards here -->
            </div>

        </main>
    </div>

    <!-- Cancel Appointment Confirmation Modal -->
    <div id="cancel-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#020617]/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-[#0f172a] border border-white/10 rounded-2xl w-full max-w-sm p-6 shadow-2xl shadow-red-500/10 transform scale-95 transition-transform duration-300 flex flex-col items-center text-center" id="cancel-modal-card">
            <div class="w-14 h-14 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center text-2xl mb-4">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Cancel Appointment?</h3>
            <p class="text-sm text-gray-400 mb-6">Are you sure you want to cancel this appointment? This action cannot be undone.</p>
            
            <div class="flex gap-3 w-full">
                <button onclick="window.closeCancelModal()" class="flex-1 py-2.5 px-4 rounded-xl font-medium text-sm text-white bg-white/5 hover:bg-white/10 border border-white/10 transition-colors">
                    No, Keep it
                </button>
                <button onclick="window.confirmCancelAction()" class="flex-1 py-2.5 px-4 rounded-xl font-medium text-sm text-white bg-red-500 hover:bg-red-600 shadow-lg shadow-red-500/20 transition-all">
                    Yes, Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="load.js"></script>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3j0hKqGlcIZBKUdWk2QgSItKQBgeyXyA",
            authDomain: "cdhp-87979.firebaseapp.com",
            projectId: "cdhp-87979",
            storageBucket: "cdhp-87979.firebasestorage.app",
            messagingSenderId: "1059870042612",
            appId: "1:1059870042612:web:2eac3dcb927f3e213bb1a1",
            measurementId: "G-BZS8FPB1K2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let appointmentToCancel = null;

        // UI Helpers
        const showLoader = () => document.getElementById('global-loader').style.display = 'flex';
        const hideLoader = () => document.getElementById('global-loader').style.display = 'none';

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `show ${type}`;
            
            if (type === 'error') {
                t.style.borderBottomColor = '#ef4444';
            } else {
                t.style.borderBottomColor = '#14b8a6';
            }
            
            setTimeout(() => { t.className = ''; }, 3000);
        }

        // Time Ago Formatter
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval >= 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval >= 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval >= 1) return Math.floor(interval) + " minutes ago";
            return "Just now";
        }

        // Parse Date and Time into Timestamp for sorting
        function getApptTimestamp(dateStr, timeStr) {
            if (!dateStr || !timeStr) return Infinity; 
            try {
                // dateStr is 'YYYY-MM-DD', timeStr is 'HH:MM AM/PM'
                const [timePart, ampm] = timeStr.split(' ');
                let [hours, mins] = timePart.split(':').map(Number);
                if (ampm === 'PM' && hours < 12) hours += 12;
                if (ampm === 'AM' && hours === 12) hours = 0;
                
                const [y, m, d] = dateStr.split('-').map(Number);
                return new Date(y, m - 1, d, hours, mins).getTime();
            } catch(e) {
                return Infinity;
            }
        }

        // --- Init & Load Data ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadUpcomingAppointments();
            } else {
                window.location.href = '../src/index.html'; 
            }
        });

        async function loadUpcomingAppointments() {
            showLoader();
            try {
                const container = document.getElementById('appointments-container');
                container.innerHTML = '';

                // Fetch "Approved" appointments for this doctor (Upcoming)
                const q = query(
                    collection(db, "appointments"), 
                    where("doctorId", "==", currentUser.uid),
                    where("status", "==", "Approved")
                );
                
                const querySnapshot = await getDocs(q);
                let appointments = [];

                querySnapshot.forEach((doc) => {
                    appointments.push({ id: doc.id, ...doc.data() });
                });

                // Sort by appointment date and time (Earliest upcoming first)
                appointments.sort((a, b) => {
                    const timeA = getApptTimestamp(a.date, a.time);
                    const timeB = getApptTimestamp(b.date, b.time);
                    return timeA - timeB; 
                });

                if (appointments.length === 0) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-20 opacity-60">
                            <i class="fa-regular fa-calendar-check text-6xl mb-4 text-gray-500"></i>
                            <h3 class="text-xl font-bold text-gray-400">No Upcoming Appointments</h3>
                            <p class="text-sm text-gray-500 mt-2">You don't have any confirmed appointments right now.</p>
                        </div>
                    `;
                    hideLoader();
                    return;
                }

                // Fetch patient details and render cards
                for (let i = 0; i < appointments.length; i++) {
                    const appt = appointments[i];
                    
                    // Default patient data
                    let patientName = "Unknown Patient";
                    let patientAvatar = `https://ui-avatars.com/api/?name=Unknown&background=0ea5e9&color=fff`;

                    // Fetch patient details from users collection
                    if (appt.patientId) {
                        const patientSnap = await getDoc(doc(db, "users", appt.patientId));
                        if (patientSnap.exists()) {
                            const pData = patientSnap.data();
                            patientName = pData.name || "Unknown Patient";
                            if (pData.profileImageUrl) {
                                patientAvatar = pData.profileImageUrl;
                            } else {
                                patientAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(patientName)}&background=0ea5e9&color=fff`;
                            }
                        }
                    }

                    const createdAtDate = appt.createdAt ? appt.createdAt.toDate() : new Date();
                    const bookedOn = `${createdAtDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}, ${createdAtDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;
                    const registeredAgo = timeAgo(createdAtDate);
                    
                    // Display Appt ID
                    const shortId = `PT-${appt.id.substring(0, 4).toUpperCase()}`;

                    // Consultation Type UI mapping
                    const isOnline = (appt.type === "Online" || appt.type === "Online Video");
                    const typeIcon = isOnline ? "fa-video" : "fa-hospital-user";
                    const typeLabel = isOnline ? "Online" : "In-Person";
                    const typeClasses = isOnline 
                        ? "bg-blue-900/40 text-blue-300 border-blue-500/20" 
                        : "bg-indigo-900/40 text-indigo-300 border-indigo-500/20";
                    
                    // Action button logic (Consult vs Join Call)
                    const actionBtnIcon = isOnline ? "fa-video" : "fa-stethoscope";
                    const actionBtnLabel = isOnline ? "Join Call" : "Consult";
                    
                    // Alternate Border colors for styling
                    const borderClass = i % 2 === 0 ? "border-brand-primary" : "border-brand-secondary";

                    const card = document.createElement('div');
                    card.className = `flex flex-col lg:flex-row items-start lg:items-center gap-4 p-4 glass-card rounded-2xl border-l-[5px] ${borderClass} hover:bg-white/[0.02] hover:shadow-[0_0_20px_rgba(14,165,233,0.1)] transition-all group`;
                    
                    card.innerHTML = `
                        <!-- Schedule Info -->
                        <div class="flex flex-col gap-1 shrink-0 lg:w-[270px]">
                            <div class="flex items-center gap-2 text-white font-bold text-sm tracking-wide whitespace-nowrap">
                                <i class="fa-regular fa-calendar text-gray-400"></i>
                                <span>${appt.date} (${appt.day})</span>
                                <span class="text-gray-600 font-normal">|</span>
                                <i class="fa-regular fa-clock text-gray-400"></i>
                                <span>${appt.time}</span>
                            </div>
                            <div class="flex items-center gap-1.5 text-xs text-gray-400 font-medium pl-0.5 whitespace-nowrap">
                                <i class="fa-solid fa-clock-rotate-left"></i>
                                <span>Booked: ${bookedOn}</span>
                            </div>
                        </div>

                        <!-- Patient Info -->
                        <div class="flex items-center gap-3 shrink-0 lg:w-[210px]">
                            <img src="${patientAvatar}" alt="Avatar" class="w-12 h-12 rounded-full border-2 border-white/20 shadow-md object-cover">
                            <div>
                                <h3 class="text-base font-bold text-white group-hover:text-brand-primary transition-colors leading-tight">${patientName}</h3>
                                <p class="text-[11px] font-bold text-gray-400 mt-0.5">Appt ID: <span class="text-brand-primary">${shortId}</span></p>
                                <p class="text-[10px] text-gray-500 mt-0.5"><i class="fa-regular fa-clock"></i> Registered: ${registeredAgo}</p>
                            </div>
                        </div>
                        
                        <!-- Reason for Visit -->
                        <div class="flex-1 w-full bg-[#020617]/60 rounded-xl p-3 border border-white/5 relative cursor-help complaint-box transition-colors hover:border-white/10" title="${appt.symptoms || 'No symptoms provided.'}">
                            <div class="flex justify-between items-center mb-1">
                                <div class="flex items-center gap-2">
                                    <p class="text-[9px] text-brand-primary/80 uppercase font-bold tracking-wider">Reason for Visit / Symptoms</p>
                                    <i class="fa-solid fa-circle-info text-gray-600 text-[10px]"></i>
                                </div>
                                <i class="fa-solid fa-quote-right text-gray-700 text-xs"></i>
                            </div>
                            <p class="text-sm text-gray-300 line-clamp-1 leading-relaxed">
                                ${appt.symptoms || 'No symptoms provided.'}
                            </p>
                        </div>
                        
                        <!-- Actions -->
                        <div class="flex flex-col gap-2 shrink-0 lg:w-[220px] w-full">
                            <div class="flex gap-2 h-8">
                                <div class="flex-1 px-2 rounded-lg text-[11px] font-medium border flex items-center justify-center whitespace-nowrap ${typeClasses}">
                                    <i class="fa-solid ${typeIcon} mr-1.5"></i> ${typeLabel}
                                </div>
                                <button onclick="window.viewPatientProfile('${appt.patientId}')" class="w-8 h-8 shrink-0 bg-[#1e293b]/50 hover:bg-white/10 text-gray-300 rounded-lg flex items-center justify-center transition-colors border border-white/5 text-sm" title="View Full Profile">
                                    <i class="fa-regular fa-folder-open"></i>
                                </button>
                            </div>
                            <div class="flex gap-2 h-8">
                                <button onclick="window.startConsultation('${appt.id}')" class="flex-1 bg-brand-primary/20 hover:bg-brand-primary hover:text-white text-brand-primary px-2 rounded-lg text-xs font-bold transition-all border border-brand-primary/30 flex items-center justify-center gap-1.5 shadow-lg">
                                    <i class="fa-solid ${actionBtnIcon}"></i> ${actionBtnLabel}
                                </button>
                                <button onclick="window.openCancelModal('${appt.id}')" class="flex-1 bg-[#7f1d1d]/30 hover:bg-red-500 hover:text-white text-red-400 px-2 rounded-lg text-xs font-bold transition-all border border-red-500/20 flex items-center justify-center gap-1.5 shadow-lg shadow-red-500/5">
                                    <i class="fa-solid fa-xmark"></i> Cancel
                                </button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }

            } catch (error) {
                console.error("Error loading upcoming appointments:", error);
                showToast("Error loading data", "error");
            }
            hideLoader();
        }

        // --- Action Functions Attached to Window ---

        // 1. View Profile
        window.viewPatientProfile = (patientId) => {
            window.location.href = `patient-profile.html?id=${patientId}`;
        };

        // 2. Start Consultation (In-person / Join Call)
        window.startConsultation = (apptId) => {
            // Redirects to consultation page where doctor can view details, write prescriptions, and complete it.
            window.location.href = `consultation.html?id=${apptId}`;
        };

        // 3. Cancel Appointment Modal Logic
        window.openCancelModal = (apptId) => {
            appointmentToCancel = apptId;
            const modal = document.getElementById('cancel-modal');
            const card = document.getElementById('cancel-modal-card');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            card.classList.remove('scale-95');
            card.classList.add('scale-100');
        };

        window.closeCancelModal = () => {
            const modal = document.getElementById('cancel-modal');
            const card = document.getElementById('cancel-modal-card');
            modal.classList.add('opacity-0', 'pointer-events-none');
            card.classList.remove('scale-100');
            card.classList.add('scale-95');
            setTimeout(() => { appointmentToCancel = null; }, 300);
        };

        window.confirmCancelAction = async () => {
            if (!appointmentToCancel) return;
            
            window.closeCancelModal();
            showLoader();
            try {
                await updateDoc(doc(db, "appointments", appointmentToCancel), {
                    status: "Cancelled"
                });
                hideLoader();
                showToast("Appointment cancelled successfully!");
                // Reload list to remove it from UI, staying on the same page
                loadUpcomingAppointments();
            } catch (error) {
                hideLoader();
                console.error("Error cancelling:", error);
                showToast("Failed to cancel.", "error");
            }
        };

    </script>
</body>
</html>
