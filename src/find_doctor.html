<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Doctor</title>
    <link rel="icon" href="../img/CDHP_Logo.ico">
    
    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;900&display=swap');
    </style>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Autocomplete & Custom Select Dropdowns */
        .autocomplete-dropdown { 
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: #fff; border: 1px solid #e2e8f0; border-radius: 0.75rem; 
            margin-top: 4px; z-index: 50; max-height: 250px; overflow-y: auto; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: none; 
        }
        .autocomplete-dropdown.show { display: block; }
        .autocomplete-item { 
            padding: 10px 16px; cursor: pointer; font-size: 0.875rem; 
            border-bottom: 1px solid #f1f5f9; transition: all 0.2s; 
            color: #334155;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: #f0fdfa; color: #0d9488; }
        
        /* Multi-select Specific */
        .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; font-size: 0.875rem; color: #334155; transition: background 0.2s; }
        .checkbox-item:hover { background: #f8fafc; }
        .checkbox-item input[type="checkbox"] { accent-color: #0d9488; width: 16px; height: 16px; cursor: pointer; }

        /* Doctor Image Ac-item */
        .ac-doctor-flex { display: flex; align-items: center; gap: 12px; }
        .ac-doctor-img { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #e2e8f0; }
        .ac-doctor-img img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Mobile Overlay */
        .filter-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 190; opacity: 0; visibility: hidden; transition: all 0.3s; backdrop-filter: blur(2px); }
        .filter-overlay.active { opacity: 1; visibility: visible; }
        
        /* Loader */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; font-size: 3rem; color: #0d9488; }

        @media (max-width: 992px) {
            #filter-sidebar { right: -100%; transition: right 0.3s ease; }
            #filter-sidebar.active { right: 0; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pt-[70px] antialiased">

    <div id="header"></div>

    <!-- Global Loader -->
    <div id="global-loader" class="loader-overlay"><i class="fa-solid fa-spinner fa-spin"></i></div>

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8 items-start relative">
        
        <!-- Left: Main Content (Doctors Grid) -->
        <main class="w-full lg:flex-1 order-2 lg:order-1">
            
            <!-- Section Header -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Find a Doctor</h1>
                    <p class="text-sm text-slate-500 mt-1">Book appointments with top specialists.</p>
                </div>
                <button id="open-filter-btn" class="lg:hidden flex items-center gap-2 bg-brand-50 text-brand-700 px-4 py-2 rounded-xl font-medium hover:bg-brand-100 transition-colors">
                    <i class="fa-solid fa-filter"></i> Filter
                </button>
            </div>

            <!-- Doctor Grid Container -->
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6" id="doctor-grid-container">
                <!-- Cards will be injected by JavaScript -->
            </div>
            
            <!-- Empty State Container -->
            <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center">
                <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 text-4xl mb-4">
                    <i class="fa-solid fa-user-doctor"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-700">No Doctors Found</h3>
                <p class="text-slate-500 text-sm mt-1 max-w-sm">We couldn't find any doctors matching your current filters. Try adjusting your search criteria.</p>
                <button onclick="window.clearFilters()" class="mt-4 text-brand-600 hover:text-brand-700 font-medium text-sm">Clear all filters</button>
            </div>
            
        </main>

        <!-- Mobile Overlay -->
        <div id="filter-overlay" class="filter-overlay lg:hidden"></div>

        <!-- Right: Filter Sidebar -->
        <aside id="filter-sidebar" class="w-[320px] shrink-0 bg-white border-l lg:border border-slate-200 lg:rounded-2xl shadow-xl lg:shadow-sm fixed lg:sticky top-0 lg:top-[94px] right-0 h-screen lg:h-auto lg:max-h-[calc(100vh-120px)] overflow-y-auto z-[200] lg:z-40 order-1 lg:order-2 flex flex-col">
            
            <!-- Sidebar Header -->
            <div class="bg-brand-800 text-white p-5 lg:rounded-t-2xl flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2 font-bold text-lg">
                    <i class="fa-solid fa-filter"></i> Filters
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="window.clearFilters()" class="text-xs text-brand-100 hover:text-white underline">Clear</button>
                    <button id="close-filter-btn" class="lg:hidden w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>
            
            <!-- Sidebar Body -->
            <div class="p-5 space-y-6 flex-1">
                
                <!-- Doctor Name Filter -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2" for="doctor-name-input">Doctor's Name</label>
                    <div id="doctor-autocomplete" class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3.5 text-slate-400"></i>
                        <input id="doctor-name-input" type="text" class="w-full bg-slate-50 border border-slate-200 text-slate-800 pl-10 pr-4 py-2.5 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors text-sm" placeholder="Search doctor...">
                        <div id="doctor-suggestions" class="autocomplete-dropdown"></div>
                    </div>
                </div>
                
                <!-- Hospital Filter -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2" for="hospital-name-input">Hospital</label>
                    <div id="hospital-autocomplete" class="relative">
                        <i class="fa-regular fa-building absolute left-3.5 top-3.5 text-slate-400"></i>
                        <input id="hospital-name-input" type="text" class="w-full bg-slate-50 border border-slate-200 text-slate-800 pl-10 pr-4 py-2.5 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors text-sm" placeholder="Search hospital...">
                        <div id="hospital-suggestions" class="autocomplete-dropdown"></div>
                    </div>
                </div>
                
                <!-- Specialization Filter -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2" for="specialization-search">Department & Specialization</label>
                    <div class="relative mb-3">
                        <i class="fa-solid fa-stethoscope absolute left-3.5 top-3.5 text-slate-400"></i>
                        <input id="specialization-search" type="text" class="w-full bg-slate-50 border border-slate-200 text-slate-800 pl-10 pr-4 py-2.5 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors text-sm" placeholder="Search specialization...">
                        <div id="specialization-suggestions" class="autocomplete-dropdown"></div>
                    </div>
                    
                    <!-- Quick Departments Grid -->
                    <div id="department-categories" class="grid grid-cols-3 gap-2"></div>
                </div>
                
                <!-- Degree Filter -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Degree</label>
                    <div id="degree-multiselect" class="relative">
                        <button id="degree-btn" type="button" class="w-full bg-slate-50 border border-slate-200 text-slate-600 px-4 py-2.5 rounded-xl flex justify-between items-center text-sm hover:border-brand-500 transition-colors focus:outline-none focus:ring-1 focus:ring-brand-500">
                            <span id="degree-btn-text" class="truncate pr-2">Select Degrees</span>
                            <i class="fa-solid fa-chevron-down text-slate-400"></i>
                        </button>
                        <div id="degree-dropdown" class="autocomplete-dropdown p-1">
                            <div class="sticky top-0 bg-white p-2 border-b border-slate-100 z-10">
                                <input id="degree-search" type="text" class="w-full bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg text-sm focus:outline-none focus:border-brand-500" placeholder="Search degree...">
                            </div>
                            <div id="degree-options" class="pt-1"></div>
                        </div>
                    </div>
                </div>

            </div>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="js/load.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA3j0hKqGlcIZBKUdWk2QgSItKQBgeyXyA",
            authDomain: "cdhp-87979.firebaseapp.com",
            projectId: "cdhp-87979",
            storageBucket: "cdhp-87979.firebasestorage.app",
            messagingSenderId: "1059870042612",
            appId: "1:1059870042612:web:2eac3dcb927f3e213bb1a1",
            measurementId: "G-BZS8FPB1K2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- State Variables ---
        let allDoctorsData = []; // Holds original fetched data
        let filteredDoctorsData = []; // Holds data after filtering

        let hospitalsList = [];
        let specialtiesList = [];
        let degreesList = [];
        let selectedDegrees = [];

        // Mapping for icons based on keywords in specialty
        const departmentIconMap = {
            'Cardi': 'fa-heart-pulse',
            'Neuro': 'fa-brain',
            'Gastro': 'fa-bacterium',
            'Nephro': 'fa-pills',
            'Derma': 'fa-hand-dots',
            'Pedia': 'fa-child-reaching',
            'Ortho': 'fa-bone',
            'Eye': 'fa-eye',
            'Dental': 'fa-tooth',
            'Onco': 'fa-ribbon',
            'Gynae': 'fa-person-pregnant'
        };

        // --- DOM Elements ---
        const doctorGridContainer = document.getElementById('doctor-grid-container');
        const emptyState = document.getElementById('empty-state');
        
        // Filter Inputs
        const nameInput = document.getElementById('doctor-name-input');
        const hospitalInput = document.getElementById('hospital-name-input');
        const specSearch = document.getElementById('specialization-search');
        const degreeBtnText = document.getElementById('degree-btn-text');

        // Helpers
        const showLoader = () => document.getElementById('global-loader').style.display = 'flex';
        const hideLoader = () => document.getElementById('global-loader').style.display = 'none';

        // --- 1. Fetch Doctors from Firebase ---
        async function fetchDoctors() {
            try {
                showLoader();
                const usersRef = collection(db, "users");
                const snapshot = await getDocs(usersRef);
                
                const fetchedDoctors = [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    // Filter only doctors
                    if (data.role === 'doctor') {
                        // Extract Degrees from education array securely
                        let degreesArr = [];
                        if (data.education && Array.isArray(data.education)) {
                            degreesArr = data.education.map(e => typeof e === 'string' ? e : e.degree).filter(Boolean);
                        }
                        const degreeStr = degreesArr.length > 0 ? degreesArr.join(', ') : 'Not Specified';

                        fetchedDoctors.push({
                            id: doc.id,
                            name: data.name || 'Unknown Doctor',
                            specialty: data.department || 'General Physician',
                            hospital: data.currentHospital || 'Not Specified',
                            degree: degreeStr,
                            degreesArr: degreesArr, // Keep array for exact matching
                            image: data.profileImageUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name || 'Doc')}&background=0d9488&color=fff&size=200`
                        });
                    }
                });

                // New to Old Sort (Reversing the array as a basic mechanism)
                allDoctorsData = fetchedDoctors.reverse();
                filteredDoctorsData = [...allDoctorsData];

                // Extract dynamic filters strictly from available DB data
                extractDynamicFilters();

                // Setup Autocomplete and Render
                setupAllFilters();
                renderDoctorCards(filteredDoctorsData);
                hideLoader();

            } catch (error) {
                hideLoader();
                console.error("Error fetching doctors:", error);
            }
        }

        // --- 2. Render Doctor Cards ---
        function renderDoctorCards(doctors) {
            doctorGridContainer.innerHTML = '';
            
            if (doctors.length === 0) {
                doctorGridContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            doctorGridContainer.classList.remove('hidden');
            emptyState.classList.remove('flex');
            emptyState.classList.add('hidden');

            doctors.forEach(doctor => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-lg hover:-translate-y-1 hover:border-brand-300 transition-all duration-300 flex flex-col group relative cursor-pointer';
                
                // Click Card -> Redirect to Details View
                card.addEventListener('click', () => {
                    window.location.href = `doctor_details_view.html?id=${doctor.id}`;
                });
                
                card.innerHTML = `
                    <div class="h-16 bg-gradient-to-r from-brand-50 to-blue-50 w-full relative border-b border-slate-100"></div>
                    
                    <div class="px-5 pb-5 flex-1 flex flex-col items-center relative -mt-14">
                        <div class="w-28 h-28 rounded-full bg-white border-4 border-white shadow-md flex items-center justify-center mb-2 overflow-hidden group-hover:scale-105 transition-transform z-10">
                            <img src="${doctor.image}" alt="${doctor.name}" class="w-full h-full object-cover">
                        </div>
                        
                        <h3 class="text-[1.1rem] font-bold text-slate-800 text-center leading-tight mb-3">${doctor.name}</h3>
                        
                        <div class="w-full flex flex-col gap-2 mt-auto">
                            <div class="flex items-center gap-3 text-[0.85rem] text-slate-500">
                                <i class="fa-regular fa-hospital text-brand-600 text-lg w-5 text-center"></i>
                                <span class="leading-tight truncate"><strong class="text-slate-600 font-bold">Hospital:</strong> ${doctor.hospital}</span>
                            </div>
                            <div class="flex items-center gap-3 text-[0.85rem] text-slate-500">
                                <i class="fa-solid fa-stethoscope text-brand-600 text-lg w-5 text-center"></i>
                                <span class="leading-tight truncate"><strong class="text-slate-600 font-bold">Specialty:</strong> ${doctor.specialty}</span>
                            </div>
                            <div class="flex items-center gap-3 text-[0.85rem] text-slate-500">
                                <i class="fa-solid fa-graduation-cap text-brand-600 text-lg w-5 text-center"></i>
                                <span class="leading-tight truncate"><strong class="text-slate-600 font-bold">Degree:</strong> ${doctor.degree}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-2.5 border-t border-slate-100 bg-white mt-auto">
                        <button class="btn-appointment w-full py-2 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-medium transition-colors shadow-sm flex justify-center items-center gap-2 text-[0.9rem]">
                            Get Appointment <i class="fa-solid fa-arrow-right text-xs"></i>
                        </button>
                    </div>
                `;

                // Handle Button Click Separately
                const btn = card.querySelector('.btn-appointment');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation(); // Prevent triggering the card click
                    window.location.href = `appointment.html?doctorId=${doctor.id}`;
                });

                doctorGridContainer.appendChild(card);
            });
        }

        // --- 3. Filter Extraction & Logic ---
        function extractDynamicFilters() {
            // Using empty Sets to guarantee only DB values are present
            const hSet = new Set();
            const sSet = new Set();
            const dSet = new Set();

            allDoctorsData.forEach(doc => {
                if (doc.hospital && doc.hospital !== 'Not Specified') hSet.add(doc.hospital.trim());
                if (doc.specialty && doc.specialty !== 'General Physician') sSet.add(doc.specialty.trim());
                doc.degreesArr.forEach(deg => { if(deg.trim()) dSet.add(deg.trim()); });
            });

            hospitalsList = [...hSet].sort();
            specialtiesList = [...sSet].sort();
            degreesList = [...dSet].sort();
        }

        function applyFilters() {
            const nameQ = nameInput.value.toLowerCase().trim();
            const hospQ = hospitalInput.value.toLowerCase().trim();
            const specQ = specSearch.value.toLowerCase().trim();
            
            filteredDoctorsData = allDoctorsData.filter(d => {
                const matchName = !nameQ || d.name.toLowerCase().includes(nameQ);
                const matchHosp = !hospQ || d.hospital.toLowerCase().includes(hospQ);
                const matchSpec = !specQ || d.specialty.toLowerCase().includes(specQ);
                
                // If selectedDegrees has items, doctor must have at least one matching degree
                const matchDeg = selectedDegrees.length === 0 || selectedDegrees.some(sd => 
                    d.degreesArr.map(deg => deg.toLowerCase()).includes(sd.toLowerCase())
                );

                return matchName && matchHosp && matchSpec && matchDeg;
            });

            renderDoctorCards(filteredDoctorsData);
        }

        // Expose to window so HTML onClick attribute can find it
        window.clearFilters = function() {
            nameInput.value = '';
            hospitalInput.value = '';
            specSearch.value = '';
            selectedDegrees = [];
            degreeBtnText.textContent = 'Select Degrees';
            
            // Uncheck all degree checkboxes
            document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach(cb => cb.checked = false);
            
            applyFilters();
        }

        // --- 4. Setup Autocomplete UI ---
        function setupAllFilters() {
            function setupAutocomplete(inputEl, suggEl, dataArray, renderFn) {
                inputEl.addEventListener('input', () => {
                    const query = inputEl.value.toLowerCase().trim();
                    suggEl.innerHTML = '';
                    
                    // Always apply filter as user types
                    applyFilters(); 

                    if (query) {
                        const filtered = dataArray.filter(item => {
                            const matchStr = typeof item === 'string' ? item : item.name;
                            return matchStr.toLowerCase().includes(query);
                        });
                        
                        if (filtered.length > 0) {
                            filtered.forEach(itemData => {
                                const itemElement = renderFn(itemData);
                                itemElement.addEventListener('click', () => {
                                    inputEl.value = typeof itemData === 'string' ? itemData : itemData.name;
                                    suggEl.classList.remove('show');
                                    applyFilters();
                                });
                                suggEl.appendChild(itemElement);
                            });
                            suggEl.classList.add('show');
                        } else { 
                            suggEl.classList.remove('show'); 
                        }
                    } else { 
                        suggEl.classList.remove('show'); 
                    }
                });
            }

            // Doctor Name Autocomplete
            setupAutocomplete(nameInput, document.getElementById('doctor-suggestions'), allDoctorsData, (doctor) => {
                const item = document.createElement('div'); item.className = 'autocomplete-item ac-doctor-flex';
                item.innerHTML = `<div class="ac-doctor-img shadow-sm border border-white"><img src="${doctor.image}"></div><div class="ac-doctor-details"><h4 class="font-bold text-slate-800">${doctor.name}</h4><p class="text-xs text-slate-500">${doctor.specialty}, ${doctor.hospital}</p></div>`;
                return item;
            });

            const simpleRender = (text) => { 
                const item = document.createElement('div'); 
                item.className = 'autocomplete-item'; 
                item.textContent = text; 
                return item; 
            };
            
            // Hospital Autocomplete
            setupAutocomplete(hospitalInput, document.getElementById('hospital-suggestions'), hospitalsList, simpleRender);
            
            // Specialization Autocomplete
            setupAutocomplete(specSearch, document.getElementById('specialization-suggestions'), specialtiesList, simpleRender);

            // Populate Quick Categories (Dynamically rendered based on Firebase data)
            const deptContainer = document.getElementById('department-categories');
            deptContainer.innerHTML = ''; // Clear existing
            
            // Take up to 6 available specialties to show as quick buttons
            const availableSpecs = specialtiesList.slice(0, 6);
            
            availableSpecs.forEach(spec => {
                // Determine icon based on keywords
                let icon = 'fa-stethoscope'; // default
                for (const [key, iconClass] of Object.entries(departmentIconMap)) {
                    if (spec.toLowerCase().includes(key.toLowerCase())) {
                        icon = iconClass;
                        break;
                    }
                }
                
                const card = document.createElement('button'); 
                card.type = "button"; 
                card.className = 'bg-white border border-slate-200 rounded-xl p-2 flex flex-col items-center gap-1.5 hover:bg-brand-50 hover:border-brand-500 hover:text-brand-700 transition-all group';
                
                // Truncate specialty name if too long
                const shortSpec = spec.length > 15 ? spec.substring(0, 12) + '..' : spec;
                
                card.innerHTML = `<i class="fa-solid ${icon} text-lg text-slate-400 group-hover:text-brand-600 transition-colors"></i><span class="text-[0.65rem] font-bold text-slate-500 group-hover:text-brand-700 text-center leading-tight" title="${spec}">${shortSpec}</span>`;
                
                card.addEventListener('click', () => {
                    specSearch.value = spec;
                    applyFilters();
                });
                deptContainer.appendChild(card);
            });

            // Degree Multi-select Population
            const degreeOptions = document.getElementById('degree-options');
            degreeOptions.innerHTML = ''; // Clear existing
            
            degreesList.forEach(degree => {
                const option = document.createElement('label'); 
                option.className = 'checkbox-item rounded-lg';
                option.innerHTML = `<input type="checkbox" value="${degree}"><span class="font-medium">${degree}</span>`;
                degreeOptions.appendChild(option);
            });

            // Degree search logic
            const degreeSearch = document.getElementById('degree-search');
            degreeSearch.addEventListener('input', () => {
                const query = degreeSearch.value.toLowerCase().trim();
                degreeOptions.querySelectorAll('.checkbox-item').forEach(label => { 
                    label.style.display = label.textContent.toLowerCase().includes(query) ? 'flex' : 'none'; 
                });
            });

            // Degree Multi-select Event Listener
            degreeOptions.addEventListener('change', (e) => {
                if(e.target.type === 'checkbox') {
                    if (e.target.checked) selectedDegrees.push(e.target.value);
                    else selectedDegrees = selectedDegrees.filter(d => d !== e.target.value);
                    
                    if (selectedDegrees.length === 0) degreeBtnText.textContent = 'Select Degrees';
                    else if (selectedDegrees.length <= 2) degreeBtnText.textContent = selectedDegrees.join(', ');
                    else degreeBtnText.textContent = `${selectedDegrees.length} degrees selected`;
                    
                    applyFilters();
                }
            });
        }

        // --- Mobile Sidebar Toggle Logic ---
        const filterSidebar = document.getElementById('filter-sidebar'), filterOverlay = document.getElementById('filter-overlay');
        const toggleRightFilter = (show) => {
            if(show) { 
                filterSidebar.classList.add('active'); 
                filterOverlay.classList.add('active'); 
                document.body.style.overflow = 'hidden'; 
            } else { 
                filterSidebar.classList.remove('active'); 
                filterOverlay.classList.remove('active'); 
                document.body.style.overflow = ''; 
            }
        };

        document.getElementById('open-filter-btn')?.addEventListener('click', () => toggleRightFilter(true));
        document.getElementById('close-filter-btn')?.addEventListener('click', () => toggleRightFilter(false));
        filterOverlay?.addEventListener('click', () => toggleRightFilter(false));

        // Close dropdowns when clicking outside
        const degreeBtn = document.getElementById('degree-btn');
        const degreeDropdown = document.getElementById('degree-dropdown');
        document.addEventListener('click', (e) => {
            if (!document.getElementById('doctor-autocomplete').contains(e.target)) document.getElementById('doctor-suggestions').classList.remove('show');
            if (!document.getElementById('hospital-autocomplete').contains(e.target)) document.getElementById('hospital-suggestions').classList.remove('show');
            if (!document.getElementById('specialization-search').contains(e.target) && !document.getElementById('specialization-suggestions').contains(e.target)) document.getElementById('specialization-suggestions').classList.remove('show');
            
            if (degreeBtn && degreeDropdown) {
                if (!degreeBtn.contains(e.target) && !degreeDropdown.contains(e.target)) {
                    degreeDropdown.classList.remove('show');
                } else if (degreeBtn.contains(e.target)) {
                    // Toggle degree dropdown
                    degreeDropdown.classList.toggle('show');
                }
            }
        });

        // Initialize Execution
        fetchDoctors();

    </script>
</body>
</html>
